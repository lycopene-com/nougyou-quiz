<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>栽培マスターへの道 - 農業技術検定3級 RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Zen Maru Gothic',sans-serif;background:#0a0515;color:#fff;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;justify-content:center}
.game-wrapper{width:100%;max-width:520px;height:100vh;height:100dvh;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(100,50,200,.3);background:#1a0a2e}
@media(min-width:540px){.game-wrapper{border-left:3px solid rgba(255,215,0,.2);border-right:3px solid rgba(255,215,0,.2)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:3px}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;height:100%;width:100%;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* ===== TITLE SCREEN ===== */
#title-screen{background:linear-gradient(180deg,#0d1b2a 0%,#1b2838 30%,#2d4a22 70%,#1a3a15 100%);align-items:center;justify-content:center;overflow-y:auto}
.title-area{text-align:center;padding:10px}
.title-main{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.6),2px 2px 0 #8B6914;letter-spacing:2px}
.title-sub{font-size:clamp(.7rem,2.5vw,1rem);color:#aed581;margin-top:4px;letter-spacing:1px}
.hero-container{position:relative;width:120px;height:140px;margin:10px auto}
.hero-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);animation:heroFloat 2s ease-in-out infinite}
.hero-head{width:60px;height:55px;background:#ffe0bd;border-radius:50% 50% 45% 45%;position:relative;margin:0 auto}
.hero-hair{position:absolute;top:-5px;left:-3px;width:66px;height:35px;background:#5d4037;border-radius:50% 50% 0 0}
.hero-eye-l,.hero-eye-r{position:absolute;top:22px;width:10px;height:12px;background:#333;border-radius:50%;animation:heroBlink 3s infinite}
.hero-eye-l{left:13px}
.hero-eye-r{right:13px}
.hero-eye-l::after,.hero-eye-r::after{content:'';position:absolute;top:2px;left:2px;width:4px;height:4px;background:#fff;border-radius:50%}
.hero-mouth{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:12px;height:6px;background:#e57373;border-radius:0 0 50% 50%}
.hero-hat{position:absolute;top:-15px;left:-8px;width:76px;height:20px;background:#4caf50;border-radius:50%;z-index:2}
.hero-hat::after{content:'';position:absolute;top:-12px;left:22px;width:32px;height:18px;background:#4caf50;border-radius:50% 50% 0 0}
.hero-torso{width:40px;height:30px;background:#8bc34a;border-radius:5px;margin:2px auto 0;position:relative}
.hero-arm-l,.hero-arm-r{position:absolute;top:5px;width:12px;height:22px;background:#ffe0bd;border-radius:6px}
.hero-arm-l{left:-10px;transform:rotate(15deg)}
.hero-arm-r{right:-10px;transform:rotate(-15deg)}
.hero-legs{display:flex;gap:4px;justify-content:center;margin-top:1px}
.hero-leg{width:14px;height:20px;background:#795548;border-radius:0 0 5px 5px}
.hero-tool{position:absolute;right:-20px;top:0;width:6px;height:50px;background:#8d6e63;transform:rotate(-20deg);border-radius:2px}
.hero-tool::after{content:'';position:absolute;top:-5px;left:-5px;width:16px;height:10px;background:#757575;border-radius:2px}
@keyframes heroFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
@keyframes heroBlink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}

.title-buttons{width:90%;max-width:360px;margin:10px auto;display:flex;flex-direction:column;gap:8px;align-items:center}
.btn-story{background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;border:none;padding:16px 40px;font-size:1.1rem;font-weight:900;font-family:inherit;border-radius:50px;cursor:pointer;box-shadow:0 4px 15px rgba(255,111,0,.4);transition:.2s;letter-spacing:2px;animation:btnPulse 2s infinite;width:100%}
.btn-story:active{transform:scale(.95)}
.btn-random,.btn-floor{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);color:#fff;padding:10px 20px;font-size:.9rem;font-weight:700;font-family:inherit;border-radius:50px;cursor:pointer;transition:.2s;width:100%}
.btn-random:hover,.btn-floor:hover{background:rgba(255,255,255,.2)}
.btn-random:active,.btn-floor:active{transform:scale(.95)}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 15px rgba(255,111,0,.4)}50%{box-shadow:0 4px 25px rgba(255,111,0,.7)}}
.high-score-area{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:6px 12px;margin:6px 0;font-size:.75rem;color:#ffd700;text-align:center;width:90%;max-width:360px}

/* ===== STAGE SELECT SCREEN ===== */
#stage-select-screen{background:linear-gradient(180deg,#0d1b2a 0%,#1a2a3e 50%,#0d1b2a 100%);overflow-y:auto;padding:15px}
.stage-select-title{font-size:1.3rem;font-weight:900;color:#ffd700;text-align:center;margin:10px 0;text-shadow:0 0 10px rgba(255,215,0,.4)}
.stage-list{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:0 auto}
.stage-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.stage-card:active{transform:scale(.97)}
.stage-card.locked{opacity:.5;cursor:not-allowed;filter:grayscale(.5)}
.stage-card.cleared{border-color:rgba(76,175,80,.5)}
.stage-card .stage-icon{font-size:1.5rem;margin-right:8px}
.stage-card .stage-info{flex:1}
.stage-card .stage-name{font-size:1rem;font-weight:900;color:#fff}
.stage-card .stage-sub{font-size:.7rem;color:#aaa;margin-top:2px}
.stage-card .stage-status{font-size:.75rem;margin-top:4px}
.stage-card .stage-status.cleared{color:#4caf50}
.stage-card .stage-status.current{color:#ff9800}
.stage-card .stage-status.locked-text{color:#666}
.stage-card-inner{display:flex;align-items:center}
.stage-card .stage-badge{font-size:1.8rem;margin-left:auto;flex-shrink:0}
.btn-back{background:transparent;border:2px solid #666;color:#ccc;padding:10px 30px;font-size:.9rem;font-family:inherit;border-radius:50px;cursor:pointer;margin:15px auto;display:block}
.btn-back:active{transform:scale(.95)}

/* Stage card colors */
.stage-card[data-stage="0"]{background:linear-gradient(135deg,rgba(34,139,34,.15),rgba(135,206,235,.1))}
.stage-card[data-stage="1"]{background:linear-gradient(135deg,rgba(13,40,24,.3),rgba(26,58,42,.2))}
.stage-card[data-stage="2"]{background:linear-gradient(135deg,rgba(74,74,90,.2),rgba(45,45,61,.15))}
.stage-card[data-stage="3"]{background:linear-gradient(135deg,rgba(45,27,78,.2),rgba(26,10,46,.15))}
.stage-card[data-stage="4"]{background:linear-gradient(135deg,rgba(139,37,0,.2),rgba(74,0,0,.15))}
.stage-card[data-stage="5"]{background:linear-gradient(135deg,rgba(26,0,42,.3),rgba(10,0,21,.2))}

/* ===== BATTLE SCREEN ===== */
#battle-screen{background:linear-gradient(180deg,#0d1b2a 0%,#1a2a1a 100%)}
.status-bar{background:linear-gradient(90deg,#1a1a2e,#2d2d44);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:nowrap;gap:4px;border-bottom:2px solid #4a4a6a;flex-shrink:0}
.status-left{display:flex;align-items:center;gap:6px}
.status-right{display:flex;align-items:center;gap:6px}
.level-info{font-size:.75rem;color:#7ec8e3}
.xp-bar-wrap{width:60px;height:8px;background:#333;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#00bcd4,#4caf50);transition:.5s;border-radius:4px}
.q-count{font-size:.7rem;color:#aaa}
.timer-text{font-size:.7rem;color:#ff9800}
.combo-display{font-size:.7rem;color:#ff9800;font-weight:700;white-space:nowrap}
.stage-label{font-size:.65rem;color:#aed581;text-align:center;padding:2px 8px;background:rgba(0,0,0,.3);flex-shrink:0}

.battle-area{flex:1;display:flex;flex-direction:column;overflow-y:auto;position:relative}
.enemy-zone{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;position:relative}
.enemy-name{font-size:.85rem;font-weight:700;color:#ffcc80;margin-bottom:2px;text-shadow:1px 1px 2px rgba(0,0,0,.5)}
.enemy-container{position:relative;width:120px;height:110px;display:flex;align-items:center;justify-content:center;transform:scale(1.3);transform-origin:center center}
.enemy-sprite{animation:enemyIdle 2s ease-in-out infinite;position:relative}
@keyframes enemyIdle{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(2deg)}75%{transform:translateY(-3px) rotate(-2deg)}}
.enemy-hp-bar{width:120px;height:10px;background:#333;border-radius:5px;overflow:hidden;margin-top:4px;border:1px solid #555}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#f44336,#ff9800,#4caf50);transition:.3s;border-radius:4px}
.enemy-hp-fill.danger{background:linear-gradient(90deg,#f44336,#ff5722)!important;animation:hpFlash .5s infinite}
@keyframes hpFlash{0%,100%{opacity:1}50%{opacity:.5}}

.question-zone{flex:0 0 auto;padding:12px 16px;background:rgba(255,255,255,.1);border-radius:12px;margin:8px 16px}
.question-text{font-size:clamp(.9rem,3vw,1.05rem);line-height:1.6;color:#e0e0e0;margin-bottom:6px}
.question-image{max-width:100%;max-height:180px;border-radius:6px;margin:4px 0;object-fit:contain}
.question-images-row{display:flex;gap:6px;justify-content:center;margin:4px 0}
.question-images-row img{max-width:48%;max-height:150px;border-radius:6px;object-fit:contain}

.choices-zone{flex:0 0 auto;padding:6px 10px 12px;display:flex;flex-direction:column;gap:5px}
.choice-btn{background:linear-gradient(135deg,#1a237e,#283593);border:2px solid #3f51b5;color:#fff;padding:12px 16px;font-size:clamp(.85rem,2.8vw,.95rem);font-family:inherit;border-radius:12px;cursor:pointer;transition:.15s;text-align:left;line-height:1.4;position:relative;overflow:hidden}
.choice-btn:active{transform:scale(.97)}
.choice-btn.correct{background:linear-gradient(135deg,#1b5e20,#2e7d32)!important;border-color:#4caf50!important;animation:correctFlash .4s}
.choice-btn.wrong{background:linear-gradient(135deg,#b71c1c,#c62828)!important;border-color:#f44336!important;animation:wrongShake .4s}
.choice-btn.disabled{pointer-events:none;opacity:.6}
.choice-btn.show-correct{border-color:#4caf50!important;background:linear-gradient(135deg,#1b5e20,#2e7d32)!important;opacity:1!important}
@keyframes correctFlash{0%{box-shadow:0 0 0 rgba(76,175,80,0)}50%{box-shadow:0 0 30px rgba(76,175,80,.6)}100%{box-shadow:0 0 0 rgba(76,175,80,0)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ===== EFFECT OVERLAYS ===== */
.effect-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;display:flex;align-items:center;justify-content:center}
.attack-text{font-size:2.5rem;font-weight:900;animation:attackPop .8s forwards;opacity:0}
@keyframes attackPop{0%{opacity:0;transform:scale(.3) rotate(-10deg)}30%{opacity:1;transform:scale(1.3) rotate(5deg)}60%{transform:scale(1)}100%{opacity:0;transform:scale(1.5) translateY(-30px)}}
.combo-text{font-size:1.5rem;font-weight:900;color:#ff9800;animation:comboPop .8s forwards;opacity:0;text-shadow:0 0 15px rgba(255,152,0,.8)}
@keyframes comboPop{0%{opacity:0;transform:scale(.5) translateY(20px)}40%{opacity:1;transform:scale(1.2) translateY(-10px)}100%{opacity:0;transform:scale(1) translateY(-40px)}}
.levelup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:levelFade 2s forwards;pointer-events:none;z-index:150}
.levelup-text{font-size:2.5rem;font-weight:900;color:#ffd700;animation:levelPop 1s forwards;text-shadow:0 0 30px rgba(255,215,0,.8)}
.levelup-sub{font-size:1.2rem;color:#fff;margin-top:8px;animation:levelPop 1s .3s forwards;opacity:0}
@keyframes levelPop{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
@keyframes levelFade{0%,70%{opacity:1}100%{opacity:0}}
.damage-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,.3);z-index:90;animation:damageFlash .3s forwards;pointer-events:none}
@keyframes damageFlash{0%{opacity:1}100%{opacity:0}}
.enemy-hit{animation:enemyDie .6s forwards!important}
@keyframes enemyDie{0%{opacity:1;transform:scale(1)}30%{opacity:.7;transform:scale(1.1)}60%{opacity:.3;transform:scale(.8)}100%{opacity:0;transform:scale(.3) translateY(20px)}}
.enemy-attack-anim{animation:enemyAttack .4s!important}
@keyframes enemyAttack{0%{transform:scale(1)}50%{transform:scale(1.2) translateY(10px)}100%{transform:scale(1)}}
.praise-text{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-size:1.4rem;font-weight:900;color:#4caf50;animation:praisePop 1s forwards;opacity:0;z-index:110;text-shadow:0 0 10px rgba(76,175,80,.6);pointer-events:none}
@keyframes praisePop{0%{opacity:0;transform:translateX(-50%) scale(.5)}30%{opacity:1;transform:translateX(-50%) scale(1.2)}50%{transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
.encourage-text{position:absolute;bottom:35%;left:50%;transform:translateX(-50%);font-size:1rem;font-weight:700;color:#ff9800;animation:praisePop 1.2s forwards;opacity:0;z-index:110;pointer-events:none}

/* ===== STAGE CLEAR SCREEN ===== */
#stage-clear-screen{background:linear-gradient(180deg,#0a1a0a 0%,#1a3a1a 50%,#0a1a0a 100%);align-items:center;justify-content:center;overflow-y:auto;padding:20px}
.clear-title{font-size:2rem;font-weight:900;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.6);animation:clearPop 1s forwards;text-align:center}
@keyframes clearPop{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.3)}100%{transform:scale(1)}}
.clear-stats{background:rgba(255,255,255,.05);border-radius:12px;padding:14px;margin:15px 0;width:90%;max-width:380px}
.clear-stat-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.1)}
.clear-stat-row:last-child{border:none}
.clear-boss{margin:15px 0;text-align:center}
.clear-boss .enemy-sprite{animation:bossDie 2s forwards}
@keyframes bossDie{0%{opacity:1;transform:scale(1)}30%{transform:scale(1.2) rotate(10deg)}60%{opacity:.5;transform:scale(.8) rotate(-15deg)}100%{opacity:0;transform:scale(.2) rotate(30deg) translateY(30px)}}
.clear-next-hint{font-size:.9rem;color:#aed581;margin:10px 0;text-align:center}
.btn-next-stage{background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;border:none;padding:14px 40px;font-size:1rem;font-weight:900;font-family:inherit;border-radius:50px;cursor:pointer;margin:8px 0;box-shadow:0 4px 15px rgba(255,111,0,.4)}
.btn-next-stage:active{transform:scale(.95)}
.btn-to-select{background:transparent;border:2px solid #666;color:#ccc;padding:10px 30px;font-size:.85rem;font-family:inherit;border-radius:50px;cursor:pointer;margin:5px 0}
.btn-to-select:active{transform:scale(.95)}

/* ===== RESULT SCREEN ===== */
#result-screen{background:linear-gradient(180deg,#0d1b2a 0%,#1a2a3e 100%);align-items:center;overflow-y:auto;padding:15px}
.result-title{font-size:1.8rem;font-weight:900;color:#ffd700;margin:10px 0;text-shadow:0 0 20px rgba(255,215,0,.4)}
.result-chara{display:flex;flex-direction:column;align-items:center;margin:10px 0}
.result-chara-body{position:relative;animation:charaFloat 2s ease-in-out infinite}
@keyframes charaFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.result-rank-title{font-size:1.3rem;font-weight:900;margin:8px 0 4px;text-shadow:0 0 15px currentColor}
.result-chara-msg{font-size:.9rem;color:#ccc;margin-bottom:8px;text-align:center}
.result-score{font-size:3rem;font-weight:900;margin:5px 0}
.result-stats{width:90%;max-width:400px;background:rgba(255,255,255,.05);border-radius:12px;padding:12px;margin:8px 0}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.1)}
.stat-row:last-child{border:none}
.cat-chart{width:90%;max-width:400px;margin:8px 0}
.cat-bar-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:.72rem}
.cat-bar-label{width:100px;text-align:right;color:#aaa;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-bg{flex:1;height:14px;background:#333;border-radius:7px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:7px;transition:.5s}
.cat-bar-pct{width:35px;color:#ccc;flex-shrink:0}
.result-btns{display:flex;flex-direction:column;gap:8px;margin:10px 0;width:90%;max-width:300px}
.btn-revenge{background:linear-gradient(135deg,#e65100,#f57c00);color:#fff;border:none;padding:12px;font-size:1rem;font-weight:700;font-family:inherit;border-radius:50px;cursor:pointer}
.btn-restart{background:transparent;border:2px solid #666;color:#ccc;padding:10px 30px;font-size:.9rem;font-family:inherit;border-radius:50px;cursor:pointer}
.btn-revenge:active,.btn-restart:active{transform:scale(.95)}

/* ===== ALL CLEAR SCREEN ===== */
#allclear-screen{background:linear-gradient(180deg,#0a0015 0%,#1a002a 30%,#000 100%);align-items:center;justify-content:center;overflow-y:auto;padding:20px}
.allclear-title{font-size:2.2rem;font-weight:900;background:linear-gradient(90deg,#ffd700,#ff6f00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;animation:allclearShine 2s infinite}
@keyframes allclearShine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
.allclear-sub{font-size:1rem;color:#aed581;margin:8px 0;text-align:center}

/* ===== CONFETTI ===== */
.confetti-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(.5);opacity:0}}

/* ===== RESULT CHARACTER CSS ===== */
.chara-seed .ch-body{width:40px;height:36px;background:radial-gradient(circle at 40% 40%,#a1887f,#6d4c41);border-radius:50%;position:relative}
.chara-seed .ch-eye-l,.chara-seed .ch-eye-r{position:absolute;top:10px;width:7px;height:8px;background:#fff;border-radius:50%}
.chara-seed .ch-eye-l{left:8px}
.chara-seed .ch-eye-r{right:8px}
.chara-seed .ch-eye-l::after,.chara-seed .ch-eye-r::after{content:'';position:absolute;top:2px;left:2px;width:4px;height:4px;background:#333;border-radius:50%}
.chara-seed .ch-mouth{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:8px;height:3px;border-bottom:2px solid #333;border-radius:0 0 50% 50%}
.chara-seed .ch-legs{display:flex;gap:4px;justify-content:center;margin-top:2px}
.chara-seed .ch-leg{width:8px;height:10px;background:#5d4037;border-radius:0 0 4px 4px}
.chara-sprout .ch-body{width:44px;height:40px;background:radial-gradient(circle at 40% 40%,#a5d6a7,#66bb6a);border-radius:50% 50% 45% 45%;position:relative}
.chara-sprout .ch-leaf-l,.chara-sprout .ch-leaf-r{position:absolute;top:-14px;width:14px;height:18px;background:#4caf50;border-radius:50%}
.chara-sprout .ch-leaf-l{left:8px;transform:rotate(-20deg)}
.chara-sprout .ch-leaf-r{right:8px;transform:rotate(20deg)}
.chara-sprout .ch-eye-l,.chara-sprout .ch-eye-r{position:absolute;top:10px;width:9px;height:10px;background:#fff;border-radius:50%}
.chara-sprout .ch-eye-l{left:8px}
.chara-sprout .ch-eye-r{right:8px}
.chara-sprout .ch-eye-l::after,.chara-sprout .ch-eye-r::after{content:'';position:absolute;top:2px;left:2px;width:5px;height:5px;background:#333;border-radius:50%}
.chara-sprout .ch-mouth{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:12px;height:5px;background:#e91e63;border-radius:0 0 50% 50%}
.chara-sprout .ch-legs{display:flex;gap:4px;justify-content:center;margin-top:2px}
.chara-sprout .ch-leg{width:10px;height:12px;background:#388e3c;border-radius:0 0 5px 5px}
.chara-seedling .ch-body{width:48px;height:44px;background:radial-gradient(circle at 40% 40%,#81c784,#43a047);border-radius:50% 50% 45% 45%;position:relative}

urce":"3級テキスト準拠"},{"question":"ロータリ耕うんの説明として、最も適切なものを選びなさい。","choices":["プラウで土を反転する耕法","回転する爪で土を砕きながら耕す方法","手作業で土を掘り返す方法","水を使って土を洗浄する方法"],"answer":1,"category":"農業機械","source":"3級テキスト準拠"},{"question":"自脱コンバインの「自脱」の意味として、最も適切なものを選びなさい。","choices":["自動で走行する機能","穂先だけを脱穀し、わらは排出する方式","自動的にエンジンが停止する機能","自動で刈り取り高さを調整する機能"],"answer":1,"category":"農業機械","source":"3級テキスト準拠"},{"question":"ビニルハウスの被覆資材として、最も一般的なものを選びなさい。","choices":["ガラス","ポリエチレンフィルム","塩化ビニルフィルム","不織布"],"answer":2,"category":"農業施設","source":"3級テキスト準拠"},{"question":"施設栽培で使用されるヒートポンプの特徴として、最も適切なものを選びなさい。","choices":["暖房のみ可能","冷暖房の両方が可能でエネルギー効率が高い","燃料を直接燃焼する","太陽光のみで稼働する"],"answer":1,"category":"農業施設","source":"3級テキスト準拠"},{"question":"チューリップの球根の種類として、最も適切なものを選びなさい。","choices":["塊茎","鱗茎（りんけい）","球茎","塊根"],"answer":1,"category":"草花","source":"3級テキスト準拠"},{"question":"ダリアの地下部の種類として、最も適切なものを選びなさい。","choices":["鱗茎","球茎","根茎","塊根"],"answer":3,"category":"草花","source":"3級テキスト準拠"},{"question":"グラジオラスの球根の種類として、最も適切なものを選びなさい。","choices":["鱗茎","球茎","塊根","根茎"],"answer":1,"category":"草花","source":"3級テキスト準拠"},{"question":"リンゴの果樹の分類として、最も適切なものを選びなさい。","choices":["核果類","仁果類","液果類","堅果類"],"answer":1,"category":"果樹","source":"3級テキスト準拠"},{"question":"果樹の剪定で「間引き剪定」の目的として、最も適切なものを選びなさい。","choices":["枝を短く切り詰める","不要な枝を元から切り取り、樹冠内の日当たりや風通しを良くする","全ての枝を切り取る","新しい枝を接ぎ木する"],"answer":1,"category":"果樹","source":"3級テキスト準拠"},{"question":"植物工場の説明として、最も適切なものを選びなさい。","choices":["露地で大規模に栽培する施設","人工光や温度・湿度を制御して周年栽培を行う施設","家畜を飼育する施設","農産物を加工する工場"],"answer":1,"category":"栽培管理","source":"3級テキスト準拠"},{"question":"クリーニングクロップの説明として、最も適切なものを選びなさい。","choices":["害虫を駆除するための作物","土壌中の過剰な塩類や養分を吸収・除去するために栽培する作物","雑草を食べる家畜","土壌を消毒する薬剤"],"answer":1,"category":"土壌・肥料","source":"3級テキスト準拠"},{"question":"EC（電気伝導度）が高い土壌の状態として、最も適切なものを選びなさい。","choices":["酸性が強い","塩類濃度が高い","有機物が多い","水分が少ない"],"answer":1,"category":"土壌・肥料","source":"3級テキスト準拠"},{"question":"スイートコーンの花の特徴として、最も適切なものを選びなさい。","choices":["両性花である","雌雄異株である","雌雄異花（雌花と雄花が同じ株の別の位置につく）","花は咲かない"],"answer":2,"category":"作物（スイートコーン）","source":"3級テキスト準拠"},{"question":"ハクサイの病気として、最も被害が大きいものを選びなさい。","choices":["うどんこ病","軟腐病","さび病","黒星病"],"answer":1,"category":"病害虫・雑草防除","source":"3級テキスト準拠"},{"question":"モンシロチョウの幼虫が主に食害する野菜として、最も適切なものを選びなさい。","choices":["トマト","キュウリ","キャベツ","ナス"],"answer":2,"category":"病害虫・雑草防除","source":"3級テキスト準拠"},{"question":"抑制栽培の説明として、最も適切なものを選びなさい。","choices":["普通の時期より早く収穫する栽培方法","普通の時期より遅く収穫する栽培方法","農薬の使用を抑える栽培方法","肥料を抑える栽培方法"],"answer":1,"category":"栽培管理","source":"3級テキスト準拠"},{"question":"電照栽培の目的として、最も適切なものを選びなさい。","choices":["害虫を駆除する","人工的に日長を調節して開花時期をコントロールする","果実の色づきを良くする","温度を上げる"],"answer":1,"category":"栽培管理","source":"3級テキスト準拠"},{"question":"キクの電照栽培で人工照明を当てる目的として、最も適切なものを選びなさい。","choices":["花芽分化を促進する","花芽分化を抑制して開花を遅らせる","茎を太くする","葉の色を濃くする"],"answer":1,"category":"草花","source":"3級テキスト準拠"},{"question":"有機農業の説明として、最も適切なものを選びなさい。","choices":["化学合成農薬と化学肥料を使用しない農業","大型機械を使用する農業","輸出向けの農業","水耕栽培のみを行う農業"],"answer":0,"category":"農業経営と食料供給","source":"3級テキスト準拠"},{"question":"地産地消の説明として、最も適切なものを選びなさい。","choices":["海外から食料を輸入すること","地域で生産された農産物をその地域で消費すること","大規模農場で大量生産すること","加工食品を地域で製造すること"],"answer":1,"category":"農業経営と食料供給","source":"3級テキスト準拠"},{"question":"次のうち、好光性種子（光発芽種子）を選びなさい。","choices":["レタス","ダイコン","キュウリ","トマト"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"次のうち、有胚乳種子を選びなさい。","choices":["トマト","キュウリ","ダイコン","ダイズ"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"秋ギクの花芽分化に関係する環境条件として、最も適切なものを選びなさい。","choices":["温度と短日の両方の条件","短日条件のみ","長日条件のみ","温度条件のみ"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"キュウリに関する説明として、最も適切なものを選びなさい。","choices":["キュウリの果実は、花の子房の部分が肥大した果実である。","キュウリの分類はアブラナ科、果菜類である。","キュウリの花は両性花で自家受粉するため施設内に放虫はしない。","キュウリは主枝に着花したものが果実となり、側枝の花は肥大しない。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"ハクサイの植え付け後の管理として、最も不適切なものを選びなさい。","choices":["誘引","中耕","除草","追肥・土寄せ"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"ダイコンの病害虫として、最も不適切なものを選びなさい。","choices":["しり腐れ病","アブラムシ","ダイコンシンクイムシ","軟腐病"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"スイートコーンの特性に関する説明として、最も不適切なものを選びなさい。","choices":["収穫後は常温でしばらく保存することで食味が保たれる。","スイートコーンはイネ科の植物で、世界三大穀物の一つである。","絹糸は雌しべにあたる部分で、子実のひとつひとつにつながっている。","スイートコーンを食害する害虫にアワノメイガ、ヨトウムシなどがある。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"ジャガイモとサツマイモに関する説明として、最も不適切なものを選びなさい。","choices":["ジャガイモとサツマイモは、花が咲きそろった頃が収穫適期である。","イモの貯蔵温度はジャガイモ５～１２℃、サツマイモ１３℃程度が適する。","ジャガイモとサツマイモは、貯蔵中にイモの糖度が高くなる傾向が見られる。","ジャガイモの塊茎は２５℃以上になると肥大が抑制され、サツマイモの塊根の肥大は２５℃程度が適する。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"果樹の分類に関する組み合わせとして、最も不適切なものを選びなさい。","choices":["常緑果樹・・・・・ナシ　カキ","つる性果樹・・・・ブドウ　キウイフルーツ","落葉果樹・・・・・リンゴ　ブルーベリー","熱帯果樹・・・・・バナナ　マンゴー"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"果樹栽培において隔年結果対策は重要である。隔年結果を防止する対策として、最も不適切なものを選びなさい。","choices":["袋かけ","せん定","摘らい・摘花","摘果・摘房"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"トマトに関する記述として、最も適切なものを選びなさい。","choices":["トマトは７～８葉前後に成長すると第１花房をつくり、その後は葉３枚ごとに花房をつくる。","施設栽培トマトで着果促進のため農家が利用している昆虫はアブラムシである。","トマトが赤くなるのは、クロロフィルという天然色素の存在による。","トマトの果実は花の柱頭の部分が大きくなったものである。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"スイートコーンの直まき栽培では、第３葉期頃に最も生育が良い苗を残し、そのほかの苗は、根ごと抜き取り１株１本とする。この管理作業のことを何というか。正しいものを選びなさい。","choices":["間引き","追肥","移植","除げつ"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"ダイズ栽培に関する記述として、最も適切なものを選びなさい。","choices":["根粒菌による窒素供給が期待できる場所では、Ｎ施用量を減らすことができる。","弱酸性から中性で、肥料養分が貧困でも、保水性のある土壌が好適である。","酸性土壌では石灰を施用し、ｐＨを７．５以上にあげる必要がある。","水田転作畑など地下水位が高い場所では、生育がよくなるので転作作物として好適である。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"リンゴの分類として、正しいものを選びなさい。","choices":["仁果類","核果類","堅果類","しょう果類"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"キュウリのべと病に関する記述として、最も適切なものを選びなさい。","choices":["葉脈に沿って多角形の黄褐色に病斑が発生する。","葉や果実表面にうどん粉をまぶしたように白く病斑が発生する。","モザイク症状が葉等に発生する。","地際付近の茎（つる）に割れ目ができる。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"雑種第一代（Ｆ１）の特性として、最も適切なものを選びなさい。","choices":["生育が旺盛で、形質が優れる。","草勢が弱くなる。","個体による生育のばらつきが大きくなる。","形質がばらばらに分離する。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"生殖成長の説明として、最も適切なものを選びなさい。","choices":["花芽の分化開始後、種子形成までの成長過程である。","葉が展開し、茎が伸びていく成長過程である。","種まき後、発芽する成長過程である。","種子が休眠している成長過程である。"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"落葉果樹の組み合わせとして、正しいものを選びなさい。","choices":["カキ　オウトウ　アンズ","リンゴ　ナシ　レモン","ウンシュウミカン　モモ　キウイフルーツ","スモモ　クリ　パイナップル"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"果樹の種類と生産量が多い上位３県である。Ａ、Ｂ、Ｃに入る果樹の組み合わせとして、最も適切なものを選びなさい。Ａ　１位　和歌山県　２位　愛媛県　３位静岡県、Ｂ　１位　青森県　２位　長野県　３位　岩手県、Ｃ　１位　山梨県　２位　長野県　３位　山形県","choices":["Ａ　ウンシュウミカン、Ｂ　リンゴ、Ｃ　ブドウ","Ａ　リンゴ、Ｂ　ブドウ、Ｃ　ウンシュウミカン","Ａ　ブドウ、Ｂ　ウンシュウミカン、Ｃ　リンゴ","Ａ　リンゴ、Ｂ　ウンシュウミカン、Ｃ　ブドウ"],"answer":0,"category":"2013栽培系","source":"2013栽培系"},{"question":"ウリ科の野菜として、最も適切なものを選びなさい。","choices":["キュウリ","トマト","ハクサイ","ダイコン"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"ハクサイの栽培管理に関する記述として、最も不適切なものを選びなさい。","choices":["追肥の遅れは、球の肥大・充実が遅れる原因にはつながらない。","育苗の適温は13～25℃である。","定植時の苗の大きさは、一般的に本葉５～６枚までである。","かたく結球したものから順次収穫する。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"耕地と雑草の組み合わせとして、最も不適切なものを選びなさい。","choices":["畑－－１年生－－タンポポ","水田－１年生－－コナギ","水田－多年生－－オモダカ","畑－－多年生－－スギナ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"根が直根性であるために移植を嫌う草花として、最も適切なものを選びなさい。","choices":["ルピナス","ヒマワリ","パンジー","アサガオ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"ウイルスフリー苗を得るために培養される部位として、最も適切なものを選びなさい。","choices":["茎頂分裂組織","胚","根端分裂組織","子房"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"イネの直播栽培におけるメリットに関する記述として、最も不適切なものを選びなさい。","choices":["出芽、苗立ちが安定する。","育苗作業が軽減できる。","移植作業が軽減できる。","稲作栽培規模を拡大することができる。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"わが国は南北に細長く、様々な果樹が栽培されている。生産量の多い果樹の１位と２位の組み合わせとして、最も適切なものを選びなさい。","choices":["ミカン（温州ミカン）・リンゴ","ナシ・カキ","カキ・ブドウ","ナシ・ブドウ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"マルチングについての説明として、最も不適切なものを選びなさい。","choices":["肥料の流亡を促進する効果がある。","マルチングとは、うねをプラスチックフィルムなどで覆うことである。","土壌の乾燥を防ぐ効果がある。","雑草の発生を抑える効果がある。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"次の草花の種子のうち硬実種子として、正しいものを選びなさい。","choices":["スイートピー","コスモス","マリーゴールド","キンセンカ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"次の球根類のうち球茎として、正しいものを選びなさい。","choices":["クロッカス","カンナ","チューリップ","シクラメン"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"次の文に示す用土として、正しいものを選びなさい。　「ミズゴケなどが湿地などで堆積・変質したものでpHが低く、保水力が高い。」","choices":["ピートモス","腐葉土","バーク","バーミキュライト"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"トマトの栽培管理として、一般的に行わないものを選びなさい。","choices":["土寄せ","追肥","かん水","芽かき"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"スイートコーンの栽培に関する説明として、最も適切なものを選びなさい。","choices":["雌雄同株であるが、受粉の効率を高めるため、複数個体栽培するとよい。","１株に着生した雌穂は収穫量を多くするため全て残す。","子実の充実を良くするため、茎葉が枯れてから収穫する。","雌穂の花柱（花糸）から害虫が入りやすいので、出てきたら直ぐに抜き取る。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"ジャガイモの栽培に関する説明として、最も適切なものを選びなさい。","choices":["比較的冷涼な気候を好み、湿害を受けやすい。","肥料は、ほとんど必要としない。","種イモを植え付ける。芽に関係なく適当に切り分けて植える。","収穫は葉が緑色のうちに早めに行う。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"サツマイモの種イモに関する説明として、最も適切なものを選びなさい。","choices":["つる割病予防のため、苗の茎基部を消毒液に漬け消毒すると効果がある。","種イモは、40～50gずつに分割して苗床に植え付ける。","採苗後、苗が発根し、下葉が黄化するまで、７日以上放置しておく。","植え付けは、茎部の１節を土に挿すよう、なるべく浅く植え付ける。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"果樹の樹の性質による分類とそれに該当する主な種類の組み合わせとして、正しいものを選びなさい。","choices":["つる性果樹・・・ブドウ","高木性果樹・・・キウイフルーツ","落葉果樹・・・・カンキツ類","常緑果樹・・・・ナシ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"キュウリに関する説明として、最も不適切なものを選びなさい。","choices":["発芽適温は20℃である。","生育適温は20～25℃である。","種まきから60日くらいで雄花や雌花が開花する。","栄養成長と生殖成長が並行して続く。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"果樹の摘果に関する説明として、最も不適切なものを選びなさい。","choices":["果実を落としても大きさや品質は変わらないから、できるだけ多く残す。","病害虫の被害を受けていないものを残す。","奇形していないものや大きいものを残す。","軸折れしにくいものや日焼けしにくいものを残す。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"稲の形態に関する記述として、最も不適切なものを選びなさい。","choices":["稲の葉脈は、網目状になっている。","稲の根は、節の上下から発根する。","稲の葉は、葉身と葉鞘の境に葉舌と葉耳がある。","稲の分げつは、節から出る。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"ジャガイモの可食部として、最も適切なものを選びなさい。","choices":["塊茎","根","種子","地上茎"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"水稲の品質・食味を向上させる技術として、最も不適切なものを選びなさい。","choices":["出穂直後に落水する。","成熟期に収穫する。","出穂期以後に追肥をしない。","高温障害を回避するよう、田植え時期を調節する。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"次の中から根粒菌と最も関係のある作物を選びなさい。","choices":["ダイズ","トウモロコシ","サツマイモ","スイカ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"害虫の防除の説明として最も不適切なものを選びなさい。","choices":["被害が大きい場合、薬剤を表示基準より高濃度で散布することもやむを得ない。","病気と同様に、害虫に抵抗性をもつ品種を選ぶことは大切である。","マリーゴールドなどの対抗植物を作付けする。","害虫の発生しやすい時期を避けて播種するなど、栽培方法を工夫する。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"挿し芽の発根を促すために用いられる植物ホルモンとして、最も適切なものを選びなさい。","choices":["インドール酢酸","エチレン","ベンジルアデニン","カイネチン"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"暗発芽種子の草花として、最も適切なものを選びなさい。","choices":["シクラメン","ペチュニア","サルビア","コリウス"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"果樹の摘果として、最も不適切なものを選びなさい。","choices":["果実を落としても大きさや品質は変わらないから、できるだけ多く残す。","病害虫の被害を受けていないものを残す。","奇形していないものや大きいものを残す。","軸折れしにくいものや日焼けしにくいものを残す。"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"次の野菜の中から、光合成の光飽和点が最も高いものとして、適切なものを選びなさい。","choices":["スイカ","レタス","キャベツ","エンドウ"],"answer":0,"category":"2010-2012栽培系","source":"2010-2012栽培系"},{"question":"ダイズの形態に関わる説明として、最も不適切なものを選びなさい。","choices":["ダイズの葉は、４枚の小葉からなっている。","ダイズの根は、直根から分枝根が出る。","ダイズの分枝は、節から出る。","ダイズの花は、節に付いている。"],"answer":0,"category":"2010-2012栽培系 // ===== IMAGE MATCHING =====
function getQuestionImages(q) {
  const t = q.question;
  if (t.includes('下の写真は左が開花、右が結実の野菜')) return [{key:'nasu_flower'},{key:'nasu_fruit'}];
  if (t.includes('イネの病気では一番被害が大きい')) return [{key:'imochi_leaf'}];
  if (t.includes('害虫の加害様式として')) return [{key:'gaichu_shokugai'}];
  if (t.includes('キュウリのべと病の原因として')) return [{key:'beto_leaf'}];
  if (t.includes('キャベツ、ハクサイ、ブロッコリー、ダイコン、コマツナなど')) return [{key:'konaga'}];
  if (t.includes('写真に示すトマトの病気')) return [{key:'tomato_disease2'}];
  if (t.includes('仁果類を代表する果樹の開花')) return [{key:'apple_blossom'}];
  if (t.includes('ダイズの生育はじめの形態')) return [{key:'daizu_diagram'}];
  return [];
}

function cleanQuestionText(text) {
  return text.replace(/（※写真は[^）]*）/g, '').replace(/\[\[images\/[^\]]*\]\]/g, '').trim();
}

// ===== BUILD STAGE QUESTIONS =====
function buildStageQuestions() {
  const valid = ALL_QUESTIONS.filter(q => !q.question.startsWith('[['));
  const stages = [];
  let offset = 0;
  for (let i = 0; i < STAGE_DEFS.length; i++) {
    const count = STAGE_DEFS[i].count;
    stages.push(valid.slice(offset, offset + count));
    offset += count;
  }
  return stages;
}
const STAGE_QUESTIONS = buildStageQuestions();

// ===== GAME STATE =====
let state = {
  mode: 'story',
  stageIdx: 0,
  questions: [],
  currentIdx: 0,
  xp: 0,
  level: 1,
  streak: 0,
  maxStreak: 0,
  correct: 0,
  wrong: 0,
  totalQ: 0,
  timer: null,
  timeLeft: 15,
  startTime: 0,
  currentMonster: null,
  wrongQuestions: [],
  catStats: {},
  isRevenge: false,
  revengeRound: 0,
  answered: false
};

// ===== DOM =====
const $ = id => document.getElementById(id);

// ===== LOCAL STORAGE =====
const SAVE_KEY = 'nougyou_rpg_v2';
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { return {}; }
}
function saveSave(data) {
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}
function getCleared() {
  const s = loadSave();
  return s.cleared || [];
}
function setClearedStage(idx) {
  const s = loadSave();
  if (!s.cleared) s.cleared = [];
  if (!s.cleared.includes(idx)) s.cleared.push(idx);
  saveSave(s);
}
function getBestScore(idx) {
  const s = loadSave();
  return (s.scores || {})[idx] || null;
}
function setBestScore(idx, pct, lv) {
  const s = loadSave();
  if (!s.scores) s.scores = {};
  const old = s.scores[idx];
  if (!old || pct > old.pct) s.scores[idx] = {pct, lv};
  saveSave(s);
}
function getGlobalBest() {
  const s = loadSave();
  return {pct: s.globalBestPct || 0, lv: s.globalBestLv || 1};
}
function setGlobalBest(pct, lv) {
  const s = loadSave();
  if (pct > (s.globalBestPct || 0)) s.globalBestPct = pct;
  if (lv > (s.globalBestLv || 1)) s.globalBestLv = lv;
  saveSave(s);
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ===== HIGH SCORE DISPLAY =====
function updateHighScore() {
  const g = getGlobalBest();
  const cleared = getCleared();
  $('highScoreArea').innerHTML = '🏆 最高スコア: ' + (g.pct || '---') + '% | 最高LV: ' + g.lv + ' | クリア: ' + cleared.length + '/6';
}

// ===== TITLE =====
function startStoryMode() {
  state.mode = 'story';
  renderStageSelect();
  showScreen('stage-select-screen');
}

function startRandomMode() {
  state.mode = 'random';
  const valid = ALL_QUESTIONS.filter(q => !q.question.startsWith('[['));
  const pool = shuffle([...valid]).slice(0, 50);
  beginBattle(pool, -1, 'ランダム50問チャレンジ');
}

function showFloorSelect() {
  state.mode = 'floor';
  renderFloorSelect();
  showScreen('floor-select-screen');
}

// ===== STAGE SELECT =====
function renderStageSelect() {
  const cleared = getCleared();
  const el = $('stageList');
  let html = '';
  STAGE_DEFS.forEach((sd, i) => {
    const isFinal = i === 5;
    const isCleared = cleared.includes(i);
    const isUnlocked = i === 0 || cleared.includes(i - 1);
    const locked = !isUnlocked && !isCleared;
    const statusText = isCleared ? '⭐ クリア済' : (isUnlocked ? '🔥 挑戦可能' : '🔒 ロック中');
    const statusCls = isCleared ? 'cleared' : (isUnlocked ? 'current' : 'locked-text');
    const best = getBestScore(i);
    const bestText = best ? ' (最高: ' + best.pct + '%)' : '';
    const stageNum = isFinal ? 'FINAL' : 'Stage ' + (i+1);

    html += '<div class="stage-card ' + (locked ? 'locked' : '') + (isCleared ? ' cleared' : '') + '" data-stage="' + i + '" ' +
      (locked ? '' : 'onclick="selectStage(' + i + ')"') + '>' +
      '<div class="stage-card-inner">' +
      '<span class="stage-icon">' + sd.icon + '</span>' +
      '<div class="stage-info">' +
      '<div class="stage-name">' + stageNum + ': ' + sd.name + '</div>' +
      '<div class="stage-sub">' + sd.count + '問 | ' + sd.theme + '</div>' +
      '<div class="stage-status ' + statusCls + '">' + statusText + bestText + '</div>' +
      '</div>' +
      '<span class="stage-badge">' + (isCleared ? '⭐' : (locked ? '🔒' : '⚔️')) + '</span>' +
      '</div></div>';
  });
  el.innerHTML = html;
}

function renderFloorSelect() {
  const el = $('floorList');
  let html = '';
  STAGE_DEFS.forEach((sd, i) => {
    const isFinal = i === 5;
    const stageNum = isFinal ? 'FINAL' : 'Stage ' + (i+1);
    const best = getBestScore(i);
    const bestText = best ? ' (最高: ' + best.pct + '%)' : '';
    html += '<div class="stage-card" data-stage="' + i + '" onclick="selectFloor(' + i + ')">' +
      '<div class="stage-card-inner">' +
      '<span class="stage-icon">' + sd.icon + '</span>' +
      '<div class="stage-info">' +
      '<div class="stage-name">' + stageNum + ': ' + sd.name + '</div>' +
      '<div class="stage-sub">' + sd.count + '問 | ' + sd.theme + '</div>' +
      '<div class="stage-status current">🔥 自由練習' + bestText + '</div>' +
      '</div>' +
      '<span class="stage-badge">⚔️</span>' +
      '</div></div>';
  });
  el.innerHTML = html;
}

function selectStage(idx) {
  state.mode = 'story';
  const pool = [...STAGE_QUESTIONS[idx]];
  const sd = STAGE_DEFS[idx];
  const isFinal = idx === 5;
  const label = (isFinal ? 'FINAL' : 'Stage' + (idx+1)) + ': ' + sd.name;
  beginBattle(pool, idx, label);
}

function selectFloor(idx) {
  state.mode = 'floor';
  const pool = shuffle([...STAGE_QUESTIONS[idx]]);
  const sd = STAGE_DEFS[idx];
  const isFinal = idx === 5;
  const label = (isFinal ? 'FINAL' : 'Stage' + (idx+1)) + ': ' + sd.name + ' (練習)';
  beginBattle(pool, idx, label);
}

// ===== BEGIN BATTLE =====
function beginBattle(pool, stageIdx, label) {
  state.stageIdx = stageIdx;
  state.questions = pool;
  state.currentIdx = 0;
  state.xp = 0;
  state.level = 1;
  state.streak = 0;
  state.maxStreak = 0;
  state.correct = 0;
  state.wrong = 0;
  state.totalQ = pool.length;
  state.timer = null;
  state.timeLeft = 15;
  state.startTime = Date.now();
  state.currentMonster = null;
  state.wrongQuestions = [];
  state.catStats = {};
  state.isRevenge = false;
  state.revengeRound = 0;
  state.answered = false;

  // Set stage background
  if (stageIdx >= 0 && stageIdx < STAGE_DEFS.length) {
    $('battle-screen').style.background = STAGE_DEFS[stageIdx].bg;
  } else {
    $('battle-screen').style.background = 'linear-gradient(180deg,#0d1b2a 0%,#1a2a1a 100%)';
  }
  $('stageLabel').textContent = label;
  showScreen('battle-screen');
  showQuestion();
}

// ===== SHOW QUESTION =====
function showQuestion() {
  if (state.currentIdx >= state.questions.length) {
    endBattle();
    return;
  }

  state.answered = false;
  const q = state.questions[state.currentIdx];

  updateLevel();
  updateComboDisplay();
  $('qCount').textContent = 'Q.' + (state.currentIdx + 1) + '/' + state.totalQ;

  // Monster - use boss for last question of stage, else random from stage pool
  const stageIdx = state.stageIdx;
  if (state.currentIdx === state.questions.length - 1 && stageIdx >= 0 && !state.isRevenge) {
    state.currentMonster = MONSTERS[STAGE_DEFS[stageIdx].bossIdx];
  } else {
    const pool = stageIdx >= 0 ? getStageMonsters(stageIdx) : MONSTERS;
    state.currentMonster = pool[Math.floor(Math.random() * pool.length)];
  }
  $('enemyName').textContent = state.currentMonster.name;
  const ec = $('enemyContainer');
  ec.innerHTML = '<div class="enemy-sprite" id="enemySprite">' + state.currentMonster.html + '</div>';

  // HP bar
  state.timeLeft = 15;
  $('enemyHp').style.width = '100%';
  $('enemyHp').classList.remove('danger');
  $('timerText').textContent = '⏱️ 15s';
  $('timerText').style.color = '#ff9800';

  // Question text
  let qText = cleanQuestionText(q.question);
  const imgs = getQuestionImages(q);
  let imgHtml = '';
  if (imgs.length === 2) {
    imgHtml = '<div class="question-images-row">';
    imgs.forEach(im => {
      if (IMAGES_B64[im.key]) imgHtml += '<img class="question-image" src="' + IMAGES_B64[im.key] + '" alt="">';
    });
    imgHtml += '</div>';
  } else if (imgs.length === 1 && IMAGES_B64[imgs[0].key]) {
    imgHtml = '<img class="question-image" src="' + IMAGES_B64[imgs[0].key] + '" alt="">';
  }

  $('questionZone').innerHTML = '<div class="question-text">' + qText + '</div>' + imgHtml;

  // Choices
  const labels = ['①','②','③','④'];
  const cz = $('choicesZone');
  cz.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = labels[i] + ' ' + c;
    btn.addEventListener('click', () => handleAnswer(i, btn));
    cz.appendChild(btn);
  });

  // Scroll battle area to top
  $('battleArea').scrollTop = 0;

  startTimer();
}

function getStageMonsters(idx) {
  // Return a subset of monsters themed to the stage
  const sets = [
    [3, 4, 5],     // Stage 1: cabbage, carrot, daikon
    [1, 6, 5],     // Stage 2: cucumber, corn, daikon
    [8, 7, 0],     // Stage 3: pumpkin, strawberry, tomato
    [2, 1, 7],     // Stage 4: eggplant, cucumber, strawberry
    [0, 6, 4],     // Stage 5: tomato, corn, carrot
    [9, 8, 2, 0]   // Final: rice, pumpkin, eggplant, tomato
  ];
  return (sets[idx] || [0,1,2]).map(i => MONSTERS[i]);
}

// ===== TIMER =====
function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = 15;
  state.timer = setInterval(() => {
    state.timeLeft -= 0.1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      clearInterval(state.timer);
      if (!state.answered) handleTimeout();
    }
    const pct = (state.timeLeft / 15) * 100;
    $('enemyHp').style.width = pct + '%';
    $('timerText').textContent = '⏱️ ' + Math.ceil(state.timeLeft) + 's';
    if (state.timeLeft <= 5) {
      $('enemyHp').classList.add('danger');
      $('timerText').style.color = '#f44336';
    }
  }, 100);
}

function handleTimeout() {
  state.answered = true;
  const q = state.questions[state.currentIdx];
  showWrongAnswer(q, -1);
}

// ===== HANDLE ANSWER =====
function handleAnswer(idx, btn) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);

  const q = state.questions[state.currentIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.add('disabled'));

  if (idx === q.answer) {
    showCorrectAnswer(q, btn, btns);
  } else {
    btn.classList.add('wrong');
    btns[q.answer].classList.add('show-correct');
    showWrongAnswer(q, idx);
  }
}

function showCorrectAnswer(q, btn, btns) {
  btn.classList.add('correct');
  state.correct++;
  state.streak++;
  if (state.streak > state.maxStreak) state.maxStreak = state.streak;

  const cat = q.category;
  if (!state.catStats[cat]) state.catStats[cat] = {correct:0,total:0};
  state.catStats[cat].correct++;
  state.catStats[cat].total++;

  let xpGain = 10;
  if (state.timeLeft >= 10) xpGain += 10;
  else if (state.timeLeft >= 5) xpGain += 5;
  if (state.streak >= 10) xpGain += 20;
  else if (state.streak >= 5) xpGain += 10;
  else if (state.streak >= 3) xpGain += 5;
  state.xp += xpGain;

  updateComboDisplay();
  showAttackEffect('⚔️ ズバッ！', '#4caf50');

  setTimeout(() => {
    const sprite = document.getElementById('enemySprite');
    if (sprite) sprite.classList.add('enemy-hit');
  }, 300);

  const praises = ['すごい！','完璧！','ナイス！','お見事！','正解！','さすが！','天才！'];
  setTimeout(() => {
    showFloatingText('✨ ' + praises[Math.floor(Math.random() * praises.length)], '#4caf50', 'praise-text');
  }, 400);

  if (state.streak >= 3) {
    let comboMsg = '';
    if (state.streak >= 10) comboMsg = '🔥🔥🔥 ' + state.streak + 'コンボ！ 無双状態！';
    else if (state.streak >= 5) comboMsg = '🔥🔥 ' + state.streak + 'コンボ！ すごい！';
    else comboMsg = '🔥 ' + state.streak + 'コンボ！';
    setTimeout(() => { showFloatingText(comboMsg, '#ff9800', 'combo-text'); }, 600);
  }

  checkLevelUp();

  setTimeout(() => {
    state.currentIdx++;
    showQuestion();
  }, 1500);
}

function showWrongAnswer(q, idx) {
  state.wrong++;
  state.streak = 0;

  const cat = q.category;
  if (!state.catStats[cat]) state.catStats[cat] = {correct:0,total:0};
  state.catStats[cat].total++;

  state.wrongQuestions.push(q);

  showAttackEffect('💥 ドカッ！', '#f44336');
  const sprite = document.getElementById('enemySprite');
  if (sprite) sprite.classList.add('enemy-attack-anim');

  const flash = document.createElement('div');
  flash.className = 'damage-flash';
  document.querySelector('.game-wrapper').appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.add('disabled'));
  if (idx >= 0) btns[idx].classList.add('wrong');
  btns[q.answer].classList.add('show-correct');

  const msgs = ['次は倒せる！💪','ドンマイ！','諦めないで！','次こそ正解！'];
  setTimeout(() => {
    showFloatingText(msgs[Math.floor(Math.random() * msgs.length)], '#ff9800', 'encourage-text');
  }, 500);

  updateComboDisplay();

  setTimeout(() => {
    state.currentIdx++;
    showQuestion();
  }, 2000);
}

// ===== LEVEL SYSTEM =====
function xpForLevel(lv) { return 30 + (lv - 1) * 30; }

function checkLevelUp() {
  let needed = xpForLevel(state.level);
  let totalUsed = 0;
  for (let i = 1; i < state.level; i++) totalUsed += xpForLevel(i);
  let xpInLevel = state.xp - totalUsed;
  if (xpInLevel >= needed) {
    state.level++;
    showLevelUpEffect();
  }
  updateLevel();
}

function updateLevel() {
  let totalUsed = 0;
  for (let i = 1; i < state.level; i++) totalUsed += xpForLevel(i);
  const xpInLevel = state.xp - totalUsed;
  const needed = xpForLevel(state.level);
  const pct = Math.min(100, (xpInLevel / needed) * 100);
  $('levelInfo').textContent = 'LV.' + state.level;
  $('xpFill').style.width = pct + '%';
}

function showLevelUpEffect() {
  const ov = document.createElement('div');
  ov.className = 'effect-overlay levelup-overlay';
  ov.innerHTML = '<div class="levelup-text">⭐ LEVEL UP! ⭐</div><div class="levelup-sub">LV.' + state.level + ' に到達！</div>';
  document.querySelector('.game-wrapper').appendChild(ov);
  setTimeout(() => ov.remove(), 2200);
}

// ===== UI HELPERS =====
function updateComboDisplay() {
  const el = $('comboDisplay');
  if (state.streak >= 3) {
    el.textContent = '🔥' + state.streak + 'コンボ';
  } else {
    el.textContent = '';
  }
}

function showAttackEffect(text, color) {
  const ov = document.createElement('div');
  ov.className = 'effect-overlay';
  ov.innerHTML = '<div class="attack-text" style="color:' + color + ';text-shadow:0 0 20px ' + color + '">' + text + '</div>';
  document.querySelector('.game-wrapper').appendChild(ov);
  setTimeout(() => ov.remove(), 900);
}

function showFloatingText(text, color, cls) {
  const el = document.createElement('div');
  el.className = cls || 'praise-text';
  el.style.color = color;
  el.textContent = text;
  document.querySelector('.game-wrapper').appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ===== END BATTLE =====
function endBattle() {
  clearInterval(state.timer);
  const total = state.correct + state.wrong;
  const pct = total > 0 ? Math.round((state.correct / total) * 100) : 0;
  const elapsed = Math.round((Date.now() - state.startTime) / 1000);

  setGlobalBest(pct, state.level);
  if (state.stageIdx >= 0) setBestScore(state.stageIdx, pct, state.level);

  // Story/Floor mode - stage clear logic
  if (state.stageIdx >= 0 && state.mode !== 'random') {
    if (state.wrongQuestions.length === 0) {
      // Perfect! Stage clear
      if (state.mode === 'story') setClearedStage(state.stageIdx);
      showStageClear(pct, elapsed);
    } else {
      // Has wrong answers - show result with revenge option
      showStageResult(pct, elapsed);
    }
  } else {
    // Random mode
    showRandomResult(pct, elapsed);
  }
}

function showStageClear(pct, elapsed) {
  const sd = STAGE_DEFS[state.stageIdx];
  const isFinal = state.stageIdx === 5;
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  if (isFinal && state.mode === 'story') {
    // ALL CLEAR!
    showAllClear(pct, elapsed);
    return;
  }

  $('clearTitle').textContent = '⭐ STAGE CLEAR ⭐';

  // Boss death animation
  const bossM = MONSTERS[sd.bossIdx];
  $('clearBoss').innerHTML = '<div class="enemy-sprite" style="display:inline-block">' + bossM.html + '</div>';
  setTimeout(() => {
    const sprite = $('clearBoss').querySelector('.enemy-sprite');
    if (sprite) sprite.style.animation = 'bossDie 2s forwards';
  }, 300);

  $('clearStats').innerHTML =
    '<div class="clear-stat-row"><span>正答率</span><span>' + pct + '%</span></div>' +
    '<div class="clear-stat-row"><span>到達レベル</span><span>LV.' + state.level + '</span></div>' +
    '<div class="clear-stat-row"><span>最大コンボ</span><span>' + state.maxStreak + '連続</span></div>' +
    '<div class="clear-stat-row"><span>所要時間</span><span>' + mins + '分' + secs + '秒</span></div>' +
    '<div class="clear-stat-row"><span>獲得XP</span><span>' + state.xp + 'XP</span></div>';

  const nextIdx = state.stageIdx + 1;
  if (nextIdx < STAGE_DEFS.length && state.mode === 'story') {
    $('clearNextHint').textContent = '次は…' + STAGE_DEFS[nextIdx].icon + ' ' + STAGE_DEFS[nextIdx].name + '！';
    $('btnNextStage').style.display = 'inline-block';
    $('btnNextStage').dataset.next = nextIdx;
  } else {
    $('clearNextHint').textContent = '';
    $('btnNextStage').style.display = 'none';
  }

  showScreen('stage-clear-screen');
  showConfetti();
}

function goNextStage() {
  const nextIdx = parseInt($('btnNextStage').dataset.next);
  if (nextIdx >= 0 && nextIdx < STAGE_DEFS.length) {
    selectStage(nextIdx);
  }
}

function showStageResult(pct, elapsed) {
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const roundLabel = state.revengeRound > 0 ? ' (ラウンド' + (state.revengeRound + 1) + ')' : '';

  $('resultTitle').textContent = state.isRevenge ? '🔥 リベンジ結果' + roundLabel : '⚔️ ステージ結果';
  $('resultChara').innerHTML = '';
  $('resultScore').textContent = pct + '%';
  $('resultScore').style.color = pct >= 80 ? '#4caf50' : pct >= 60 ? '#ff9800' : '#f44336';

  $('resultStats').innerHTML =
    '<div class="stat-row"><span>正解数</span><span>' + state.correct + ' / ' + (state.correct + state.wrong) + '</span></div>' +
    '<div class="stat-row"><span>到達レベル</span><span>LV.' + state.level + '</span></div>' +
    '<div class="stat-row"><span>最大コンボ</span><span>' + state.maxStreak + '連続</span></div>' +
    '<div class="stat-row"><span>所要時間</span><span>' + mins + '分' + secs + '秒</span></div>' +
    '<div class="stat-row"><span>獲得XP</span><span>' + state.xp + 'XP</span></div>';

  buildCatChart();

  if (state.wrongQuestions.length > 0) {
    $('btnRevenge').style.display = 'block';
    $('btnRevenge').textContent = '🔥 間違えた' + state.wrongQuestions.length + '問にリベンジ！';
  } else {
    $('btnRevenge').style.display = 'none';
  }

  showScreen('result-screen');
}

function showRandomResult(pct, elapsed) {
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const chara = getResultCharacter(pct);

    '<div class="stat-row"><span>到達レベル</span><span>LV.' + state.level + '</span></div>' +
    '<div class="stat-row"><span>最大コンボ</span><span>' + state.maxStreak + '連続</span></div>' +
    '<div class="stat-row"><span>所要時間</span><span>' + mins + '分' + secs + '秒</span></div>' +
    '<div class="stat-row"><span>獲得XP</span><span>' + state.xp + 'XP</span></div>';

  buildCatChart();

  if (state.wrongQuestions.length > 0) {
    $('btnRevenge').style.display = 'block';
    $('btnRevenge').textContent = '🔥 間違えた' + state.wrongQuestions.length + '問にリベンジ';
  } else {
    $('btnRevenge').style.display = 'none';

  showScreen('result-screen');

}

function showAllClear(pct, elapsed) {
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  // Calculate overall stats from all stages
  const chara = getResultCharacter(pct);

  $('allclearTitle').innerHTML = '🌟 GAME CLEAR 🌟<br>全ステージ制覇！';
  $('allclearSub').textContent = '農業技術検定3級の知識を完全習得！伝説の栽培マスターの誕生だ！';

  $('allclearChara').innerHTML = chara.html +
    '<div class="result-rank-title" style="color:' + chara.color + '">あなたは【' + chara.title + '】です！</div>' +
    '<div class="result-chara-msg">' + chara.msg + '</div>';

  $('allclearStats').innerHTML =
    '<div class="stat-row"><span>最終ステージ正答率</span><span>' + pct + '%</span></div>' +
    '<div class="stat-row"><span>到達レベル</span><span>LV.' + state.level + '</span></div>' +
    '<div class="stat-row"><span>所要時間</span><span>' + mins + '分' + secs + '秒</span></div>';

  showScreen('allclear-screen');
  showConfetti();
  // Extra confetti bursts
  setTimeout(() => showConfetti(), 1500);
  setTimeout(() => showConfetti(), 3000);
}

// ===== REVENGE =====
function startRevenge() {
  if (state.wrongQuestions.length === 0) return;
  const pool = shuffle([...state.wrongQuestions]);
  const savedXP = state.xp;
  const savedLv = state.level;
  const savedStage = state.stageIdx;
  const savedMode = state.mode;
  const round = state.revengeRound + 1;

  state.questions = pool;
  state.currentIdx = 0;
  state.xp = savedXP;
  state.level = savedLv;
  state.streak = 0;
  state.maxStreak = 0;
  state.correct = 0;
  state.wrong = 0;
  state.totalQ = pool.length;
  state.timer = null;
  state.timeLeft = 15;
  state.startTime = Date.now();
  state.currentMonster = null;
  state.wrongQuestions = [];
  state.catStats = {};
  state.isRevenge = true;
  state.revengeRound = round;
  state.answered = false;
  state.stageIdx = savedStage;
  state.mode = savedMode;

  if (savedStage >= 0 && savedStage < STAGE_DEFS.length) {
    $('battle-screen').style.background = STAGE_DEFS[savedStage].bg;
    const sd = STAGE_DEFS[savedStage];
    const isFinal = savedStage === 5;
    $('stageLabel').textContent = (isFinal ? 'FINAL' : 'Stage' + (savedStage+1)) + ': ' + sd.name + ' (リベンジR' + (round+1) + ')';
  } else {
    $('stageLabel').textContent = 'リベンジ R' + (round+1);
  }

  showScreen('battle-screen');
  showQuestion();
}

// ===== BUILD CAT CHART =====
function buildCatChart() {
  const cc = $('catChart');
  let chartHtml = '';
  const entries = Object.entries(state.catStats).sort((a,b) => b[1].total - a[1].total);
  entries.forEach(([cat, s]) => {
    const p = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
    const color = p >= 80 ? '#4caf50' : p >= 60 ? '#ff9800' : '#f44336';
    chartHtml += '<div class="cat-bar-row"><div class="cat-bar-label">' + cat + '</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:' + p + '%;background:' + color + '"></div></div><div class="cat-bar-pct">' + p + '%</div></div>';
  });
  cc.innerHTML = chartHtml;
}

// ===== CONFETTI =====
function showConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.querySelector('.game-wrapper').appendChild(container);
  const colors = ['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ffeb3b','#ff9800','#ffd700'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 1.5 + 's';
    c.style.width = (5 + Math.random() * 8) + 'px';
    c.style.height = (5 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    container.appendChild(c);
  }
  setTimeout(() => container.remove(), 5000);
}

// ===== UTILS =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== BEFOREUNLOAD =====
window.addEventListener('beforeunload', e => {
  if (document.querySelector('#battle-screen.active')) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ===== BOOT =====
document.addEventListener('DOMContentLoaded', () => {
  updateHighScore();
});
